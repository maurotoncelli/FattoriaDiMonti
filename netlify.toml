# ============================================================
# Fattoria di Monti — Netlify Deployment Configuration
# ============================================================

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION             = "20"
  NEXT_TELEMETRY_DISABLED  = "1"
  NPM_FLAGS                = "--legacy-peer-deps"

# Netlify Next.js runtime plugin (SSR, image optimization, i18n)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Headers di sicurezza globali ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    X-XSS-Protection         = "1; mode=block"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# ── Cache aggressivo per assets statici ──────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirect www → apex ───────────────────────────────────────
[[redirects]]
  from   = "https://www.fattoriadimonti.it/*"
  to     = "https://fattoriadimonti.it/:splat"
  status = 301
  force  = true

# ── Redirect locale di default (it → root) ────────────────────
# next-intl con localePrefix: 'as-needed' gestisce già questo,
# ma aggiungiamo un safety net Netlify-side
[[redirects]]
  from   = "/it/*"
  to     = "/:splat"
  status = 301
  force  = false
